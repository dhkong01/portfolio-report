name: Portfolio Daily Report

on:
  schedule:
    - cron: '55 21 * * 1-5'   # UTC 21:55 = KST 06:55 (월~금)
  workflow_dispatch:

permissions:
  contents: write              # latest_report.txt 커밋 권한

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 의존성 설치
        run: pip install yfinance

      - name: 리포트 생성 및 커밋
        run: python report.py
